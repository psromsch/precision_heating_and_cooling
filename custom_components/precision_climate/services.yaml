set_schedule:
  name: Set room schedule
  description: >
    Replace one day's schedule blocks for a room. The blocks must cover the
    whole day (00:00-24:00) with no gaps or overlaps. Used by the visual
    schedule card, but can be called directly.
  fields:
    room_id:
      name: Room ID
      description: The room's id (slug), e.g. living.
      required: true
      example: living
      selector:
        text:
    day_key:
      name: Day key
      description: >
        Which day to replace. all (all_days mode); weekday/weekend
        (weekday_weekend mode); mon..sun (per_day mode).
      required: true
      example: all
      selector:
        text:
    blocks:
      name: Blocks
      description: >
        List of {start_min, end_min, target, is_active}. Minutes are
        minute-of-day (0-1440).
      required: true
      example: >
        [{"start_min": 0, "end_min": 480, "target": 18, "is_active": false},
         {"start_min": 480, "end_min": 1440, "target": 21, "is_active": true}]
      selector:
        object:

set_room_pause:
  name: Pause or resume a room
  description: >
    Pause a room (drops its effective target so it stops calling for heat
    until resumed) or resume it. The stored schedule is untouched. Used by the
    visual schedule card's pause button.
  fields:
    room_id:
      name: Room ID
      description: The room's id (slug), e.g. living.
      required: true
      example: living
      selector:
        text:
    paused:
      name: Paused
      description: true to pause, false to resume.
      required: true
      example: true
      selector:
        boolean:

set_room_boost:
  name: Boost or cancel a room's boost
  description: >
    Boost a room to a target temperature (and make it active) for the
    configured boost duration, overriding its schedule. Calling again refreshes
    the target and restarts the timer. Normally triggered automatically when you
    change a TRV's setpoint by hand; can also be called directly. Use cancel to
    end a boost immediately.
  fields:
    room_id:
      name: Room ID
      description: The room's id (slug), e.g. living.
      required: true
      example: living
      selector:
        text:
    target:
      name: Target
      description: Boost target in °C. Required unless cancel is true.
      required: false
      example: 21
      selector:
        number:
          min: 5
          max: 30
          step: 0.1
          unit_of_measurement: "°C"
    cancel:
      name: Cancel
      description: true to end the room's boost immediately.
      required: false
      example: true
      selector:
        boolean:

set_room_child_lock:
  name: Set a room's TRV child lock
  description: >
    Turn the child lock on or off for every TRV in a room that has a child-lock
    entity configured. switch entities are toggled on/off; lock entities are
    locked/unlocked. Used by the schedule card's configuration panel.
  fields:
    room_id:
      name: Room ID
      description: The room's id (slug), e.g. living.
      required: true
      example: living
      selector:
        text:
    on:
      name: On
      description: true to engage the child lock, false to release it.
      required: true
      example: true
      selector:
        boolean:

set_settings:
  name: Update global settings
  description: >
    Shallow-merge a partial global settings dict into the integration's stored
    settings (boost duration, away mode, etc.). Only the keys you send are
    changed; everything else is preserved. Used by the schedule card's
    configuration panel.
  fields:
    settings:
      name: Settings
      description: >
        Partial settings mapping, e.g. {"boost_duration_hours": 2}.
      required: true
      example: '{"boost_duration_hours": 2}'
      selector:
        object:
